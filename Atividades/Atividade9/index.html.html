<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 9 - Funções JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 Atividade 9 - Funções JavaScript</h1>

        <!-- Exercício 1 -->
        <section class="exercicio">
            <h2>1️⃣ Maior de Três Números</h2>
            <div class="input-group">
                <input type="number" id="num1" placeholder="Primeiro número">
                <input type="number" id="num2" placeholder="Segundo número">
                <input type="number" id="num3" placeholder="Terceiro número">
            </div>
            <button onclick="testarMaiorTres()">Verificar</button>
            <div id="resultado1" class="resultado"></div>
        </section>

        <!-- Exercício 2 -->
        <section class="exercicio">
            <h2>2️⃣ Ordenar Três Números (Crescente)</h2>
            <div class="input-group">
                <input type="number" id="num4" placeholder="Primeiro número">
                <input type="number" id="num5" placeholder="Segundo número">
                <input type="number" id="num6" placeholder="Terceiro número">
            </div>
            <button onclick="testarOrdenar()">Ordenar</button>
            <div id="resultado2" class="resultado"></div>
        </section>

        <!-- Exercício 3 -->
        <section class="exercicio">
            <h2>3️⃣ Verificar Palíndromo</h2>
            <div class="input-group">
                <input type="text" id="textoPalindromo" placeholder="Digite uma palavra ou frase">
            </div>
            <button onclick="testarPalindromo()">Verificar</button>
            <div id="resultado3" class="resultado"></div>
        </section>

        <!-- Exercício 4 -->
        <section class="exercicio">
            <h2>4️⃣ Verificar Subconjunto</h2>
            <div class="input-group">
                <input type="text" id="palavra1" placeholder="Primeira palavra">
                <input type="text" id="palavra2" placeholder="Segunda palavra">
            </div>
            <button onclick="testarSubconjunto()">Verificar</button>
            <div id="resultado4" class="resultado"></div>
        </section>

        <!-- Exercício 5 -->
        <section class="exercicio">
            <h2>5️⃣ Dia da Semana</h2>
            <div class="input-group">
                <input type="date" id="dataSemana">
            </div>
            <button onclick="testarDiaSemana()">Verificar</button>
            <div id="resultado5" class="resultado"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
