<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 15 - Formulário Principal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Formulário Principal</h1>
        
        <form id="meuFormulario" name="nomeform" onsubmit="return validar()">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome">
            </div>
            
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email">
            </div>
            
            <div class="form-group">
                <label for="comentario">Comentário:</label>
                <textarea id="comentario" name="comentario" rows="5"></textarea>
            </div>
            
            <div class="form-group">
                <label>Pesquisa:</label>
                <p class="pergunta">Primeira vez nesta página?</p>
                <div class="radio-group">
                    <input type="radio" id="sim" name="pesquisa" value="sim">
                    <label for="sim">Sim</label>
                    
                    <input type="radio" id="nao" name="pesquisa" value="nao">
                    <label for="nao">Não</label>
                </div>
            </div>
            
            <div class="botoes">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
