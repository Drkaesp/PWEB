<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 14 - Conversor de Texto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Conversor de Texto</h1>
        
        <div class="form-group">
            <label for="inputTexto">Digite o texto:</label>
            <input type="text" id="inputTexto" placeholder="Digite seu texto aqui...">
        </div>
        
        <div class="form-group">
            <label>Selecione a opção:</label>
            
            <div class="radio-group">
                <input type="radio" id="radioMaiuscula" name="opcao" value="maiuscula">
                <label for="radioMaiuscula">Converter para MAIÚSCULAS</label>
            </div>
            
            <div class="radio-group">
                <input type="radio" id="radioMinuscula" name="opcao" value="minuscula">
                <label for="radioMinuscula">Converter para minúsculas</label>
            </div>
        </div>
        
        <div class="form-group">
            <label>Resultado:</label>
            <div id="resultado" class="resultado"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
